<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Exeggutor Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #terminal-container { width: 100%; height: 100%; padding: 4px; }
    .xterm { height: 100%; padding: 0; }
    .xterm-viewport { scrollbar-width: thin; }
  </style>
</head>
<body>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

  <script>
    // Terminal bridge for Exeggutor Mobile.
    // Communicates with the React Native WebView via postMessage.

    var terminal = null; // xterm.js Terminal instance.
    var fitAddon = null; // FitAddon for auto-sizing.
    var ws = null; // WebSocket connection to the backend.
    var tabId = null; // Active terminal tab ID.
    var connectionHost = null; // Backend Tailscale host.
    var connectionPort = null; // Backend port.
    var authToken = null; // Bearer token for authentication.
    var isConnected = false; // WebSocket connection state flag.
    var lastCols = 0; // Last reported column count for resize dedup.
    var lastRows = 0; // Last reported row count for resize dedup.

    // Reports a status update back to the React Native host.
    function reportStatus(status) {
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'status', connected: status }));
      }
    }

    // Sends a resize message to the backend WebSocket.
    function sendResize() {
      if (!terminal || !ws || ws.readyState !== WebSocket.OPEN) return;
      if (fitAddon) {
        try { fitAddon.fit(); } catch (e) { /* safe ignore */ }
      }
      var cols = Math.max(terminal.cols, 40);
      var rows = Math.max(terminal.rows, 10);
      if (cols === lastCols && rows === lastRows) return;
      lastCols = cols;
      lastRows = rows;
      ws.send(JSON.stringify({ type: 'resize', cols: cols, rows: rows }));
    }

    // Closes the current WebSocket connection and cleans up.
    function disconnect() {
      if (ws) {
        ws.onopen = null;
        ws.onclose = null;
        ws.onerror = null;
        ws.onmessage = null;
        if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
          ws.close();
        }
        ws = null;
      }
      isConnected = false;
      reportStatus(false);
    }

    // Connects to a backend terminal WebSocket for the given tab.
    function connect(host, port, token, tab) {
      disconnect();
      connectionHost = host;
      connectionPort = port;
      authToken = token;
      tabId = tab;

      if (!terminal) {
        initializeTerminal();
      }

      var wsUrl = 'ws://' + host + ':' + port + '/ws/terminal/' + tab + '?token=' + encodeURIComponent(token);
      ws = new WebSocket(wsUrl);

      ws.onopen = function() {
        isConnected = true;
        reportStatus(true);
        sendResize();
        if (terminal) terminal.focus();
      };

      ws.onclose = function() {
        isConnected = false;
        reportStatus(false);
      };

      ws.onerror = function() {
        isConnected = false;
        reportStatus(false);
      };

      ws.onmessage = function(event) {
        if (terminal) {
          try {
            terminal.write(event.data);
          } catch (e) { /* safe ignore */ }
        }
      };
    }

    // Creates the xterm.js terminal instance in the container div.
    function initializeTerminal() {
      var container = document.getElementById('terminal-container');
      if (!container) return;

      terminal = new Terminal({
        cursorBlink: true,
        cursorStyle: 'block',
        scrollback: 5000,
        fontSize: 14,
        fontFamily: 'JetBrains Mono, monospace, courier-new, courier',
        theme: {
          background: '#000000',
          foreground: '#f4f4f5',
          cursor: '#ffffff',
          selectionBackground: 'rgba(255, 255, 255, 0.15)',
          black: '#000000',
          red: '#ef4444',
          green: '#22c55e',
          yellow: '#eab308',
          blue: '#3b82f6',
          magenta: '#ec4899',
          cyan: '#06b6d4',
          white: '#f4f4f5',
        },
      });

      fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(container);
      fitAddon.fit();

      terminal.onData(function(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', data: data }));
        }
      });

      // Resize the terminal when the window changes size.
      window.addEventListener('resize', function() {
        if (fitAddon) {
          try { fitAddon.fit(); } catch (e) { /* safe ignore */ }
        }
        sendResize();
      });

      setTimeout(function() {
        if (fitAddon) {
          try { fitAddon.fit(); } catch (e) { /* safe ignore */ }
        }
        sendResize();
        terminal.focus();
      }, 100);
    }

    // Inserts text into the terminal as if it were typed by the user.
    function insertText(text) {
      if (!terminal) return;
      terminal.write(text);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data: text }));
      }
    }

    // Writes raw data to the terminal display (for reconnection replay).
    function writeOutput(data) {
      if (terminal) {
        try { terminal.write(data); } catch (e) { /* safe ignore */ }
      }
    }

    // Resizes the terminal to the specified dimensions.
    function resize(cols, rows) {
      if (terminal) {
        terminal.resize(cols, rows);
        sendResize();
      }
    }

    // Resets the terminal state.
    function reset() {
      if (terminal) {
        terminal.reset();
      }
    }

    // Listen for messages from the React Native host.
    window.addEventListener('message', function(event) {
      try {
        var msg = JSON.parse(event.data);
        handleMessage(msg);
      } catch (e) { /* safe ignore */ }
    });

    // Also listen via document for React Native WebView compatibility.
    document.addEventListener('message', function(event) {
      try {
        var msg = JSON.parse(event.data);
        handleMessage(msg);
      } catch (e) { /* safe ignore */ }
    });

    // Handles incoming messages from the React Native bridge.
    function handleMessage(msg) {
      switch (msg.type) {
        case 'connect':
          connect(msg.host, msg.port, msg.token, msg.tabId);
          break;
        case 'disconnect':
          disconnect();
          break;
        case 'voice-input':
          insertText(msg.text);
          break;
        case 'resize':
          resize(msg.cols, msg.rows);
          break;
        case 'write':
          writeOutput(msg.data);
          break;
        case 'reset':
          reset();
          break;
      }
    }

    // Signal to the RN host that the terminal HTML is ready.
    reportStatus(false);
  </script>
</body>
</html>
